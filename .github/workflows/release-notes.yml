name: Release notes

# Maintainer-facing weekly changelog. Runs every Sunday 23:00 UTC
# (Monday 09:00 AEST), summarises merged PRs since the last entry in
# CHANGELOG.md, and opens a draft PR. Nothing patient- or carer-visible
# is touched — this is repo-side tooling for Thomas, not a feed item.
#
# Manual trigger via the Actions tab is supported for testing or when
# the cron skips a week (e.g. quiet stretch with zero merges).

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Generate release notes
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release-notes.mjs

      - name: Open release-notes PR
        if: steps.gen.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/release-notes
          base: main
          commit-message: "chore: weekly release notes"
          title: "chore: weekly release notes"
          body: |
            Automated weekly summary of merged PRs, generated by
            `.github/workflows/release-notes.yml`.

            Edit, merge, or close as appropriate. Nothing patient- or
            carer-visible is affected by this PR.
          add-paths: CHANGELOG.md
          draft: true
