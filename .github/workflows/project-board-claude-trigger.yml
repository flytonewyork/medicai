name: Trigger Claude on issue label

# Apply the `status:in-progress` label to an issue and this workflow
# posts an @claude mention. The Claude Code GitHub App picks up the
# mention and starts a fresh session scoped to that issue.
#
# Why a label and not a project-board drag:
# `projects_v2_item` events are real GitHub webhooks but GitHub
# Actions does NOT accept them as `on:` keys for repository-level
# workflows — only for organisation-level workflows in the org's
# `.github` repo. The "save dads life" project is user-owned, so we
# bridge via a label.
#
# **Drag-on-board does NOT trigger this workflow** — GitHub Projects
# v2 doesn't natively sync the Status field to a label. To wake
# Claude on a card, either:
#   (a) apply the `status:in-progress` label directly on the issue
#       (one click in the Issues tab), or
#   (b) run this workflow manually from the Actions tab with an
#       issue number, or
#   (c) set up a separate cron-based sync workflow that polls the
#       project's GraphQL API and applies the label when status
#       changes — requires a fine-grained PAT with `read:project`.
#       Not configured today; ask Claude to ship it if labelling
#       friction becomes annoying.
#
# REPO SETTING REQUIRED: Settings -> Actions -> General -> Workflow
# permissions must be "Read and write permissions". Without it the
# `permissions:` block below is silently capped and the workflow
# fails with `HttpError: Resource not accessible by integration`.
#
# Two paths to fire this:
#   1. Apply the `status:in-progress` label on the issue manually
#      (one click in the Issues tab — it auto-creates the label on
#      first use).
#   2. Run this workflow manually from the Actions tab with an issue
#      number — useful if you don't want to label.
#
# If you want to keep the project board as the single source of
# truth, GitHub Projects v2 has a built-in workflow "Status field ->
# label sync" that you'd need to set up separately on the project
# itself (Settings -> Workflows). Once configured, dragging the card
# to "In Progress" applies the label automatically, which fires this
# workflow.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to post the @claude comment on"
        required: true
        type: string

permissions:
  # `pull-requests: write` is required because the issues/comments API
  # is shared between Issues and PRs (they share the same number
  # space). When the target number resolves to a PR, the API rejects
  # with 403 unless this permission is also granted. Header proof:
  #   x-accepted-github-permissions: issues=write; pull_requests=write
  issues: write
  pull-requests: write
  contents: read

jobs:
  trigger-claude:
    runs-on: ubuntu-latest
    # Run on:
    #   (a) workflow_dispatch — always, with the user-supplied issue number
    #   (b) issues.labeled — only when the new label is `status:in-progress`
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'status:in-progress') }}
    steps:
      - name: Resolve issue number
        id: resolve
        uses: actions/github-script@v7
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_ISSUE_NUMBER: ${{ inputs.issue_number }}
          LABELED_ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          # Explicit token wiring. Defaults to the same value but
          # makes the auth path obvious when debugging "Resource not
          # accessible by integration" errors.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = process.env.EVENT_NAME;
            let n;
            if (eventName === 'workflow_dispatch') {
              n = parseInt(process.env.MANUAL_ISSUE_NUMBER, 10);
            } else {
              n = parseInt(process.env.LABELED_ISSUE_NUMBER, 10);
            }
            if (!Number.isFinite(n)) {
              core.setFailed('Could not resolve issue number');
              return;
            }
            core.setOutput('issue_number', String(n));

      - name: Post @claude trigger comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const body = [
              '@claude this issue was marked **In Progress** — picking it up.',
              '',
              'Please read the issue body for full context, plan the work, and ship.',
              'If anything is ambiguous or needs Thomas / Hu Lin input, comment instead of guessing.',
              '',
              '_Posted automatically by `.github/workflows/project-board-claude-trigger.yml`._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
